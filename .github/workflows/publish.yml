name: Publish deps-guard to npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Tipo de bump da versão"
        required: true
        default: "patch"
        type: choice
        options: [patch, minor, major]
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          cd packages/deps-guard && npm version ${{ inputs.bump }} --no-git-tag-version
          echo "NEW_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Commit and tag version bump (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/deps-guard/package.json
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }}"
          git tag "v${{ env.NEW_VERSION }}"
          git push
          git push origin "v${{ env.NEW_VERSION }}"

      - name: Set version from tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          NEW_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          node -e "
            const fs = require('fs');
            const p = require('./packages/deps-guard/package.json');
            p.version = process.env.NEW_VERSION;
            fs.writeFileSync('./packages/deps-guard/package.json', JSON.stringify(p, null, 2));
          "

      - name: Update lockfile
        run: |
          pnpm install

      - name: Publish to npm
        working-directory: packages/deps-guard
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.NEW_VERSION }}"
          generate_release_notes: true
